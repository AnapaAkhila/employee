name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  ECR_REPOSITORY: employee
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate Image Tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.ECR_REPOSITORY }}:$TAG .

      - name: Tag Docker Image
        run: |
          docker tag \
            ${{ secrets.ECR_REPOSITORY }}:$TAG \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:$TAG

      - name: Push Docker Image
        run: |
          docker push \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:$TAG

      - name: Clone GitOps Repository
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository_owner }}/employee-k8s.git

      - name: Update deployment.yaml
        run: |
          sed -i "s|image:.*|image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:$TAG|" employee-k8s/deployment.yaml

      - name: Commit Changes
        run: |
          cd employee-k8s

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add deployment.yaml

          git diff --cached --quiet || git commit -m "Update image to $TAG"

      - name: Push Changes
        run: |
          cd employee-k8s
          git push origin main